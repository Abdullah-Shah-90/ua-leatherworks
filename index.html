<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UA Leather Works</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0a0a0a;
color: white;
}

header {
display: flex;
justify-content: space-between;
padding: 20px;
background: black;
}

nav a {
color: white;
margin: 0 10px;
text-decoration: none;
}

.hero {
height: 90vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
background: url('https://images.unsplash.com/photo-1520975693419-8e6a9b6a6d8c') no-repeat center/cover;
}

.hero h1 {
font-size: 50px;
}

button {
padding: 12px 25px;
background: gold;
border: none;
cursor: pointer;
}

.section {
padding: 60px;
text-align: center;
}

.cards {
display: flex;
justify-content: center;

.card {

<h2>UA Store</h2>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>

<section class="hero">

<p>Style. Power. Identity.</p>
<button>Shop Now</button>
</section>

<section class="section">
<h2>Our Products</h2>
<div class="cards">
<div class="card">Jackets</div>
<div class="card">Bags</div>
<div class="card">Belts</div>
</div>
</section>
