<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UA Leather Works</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
font-family: 'Poppins', sans-serif;
background: #0a0a0a;
color: white;
}

header {
display: flex;
justify-content: space-between;
padding: 20px 50px;
background: rgba(0,0,0,0.8);
position: fixed;
width: 100%;
top: 0;
}

nav a {
color: white;
margin: 0 15px;
text-decoration: none;
font-weight: 500;
}

.hero {
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
background: url('https://images.unsplash.com/photo-1542060748-10c28b62716f') no-repeat center/cover;
}

.hero h1 {
font-size: 60px;
letter-spacing: 2px;
}

.hero p {
font-size: 18px;
margin: 15px 0;
}

button {
padding: 12px 30px;
background: gold;
border: none;
cursor: pointer;
font-weight: bold;
}

.section {
padding: 100px 50px;
text-align: center;
}

.products {
display: flex;
justify-content: center;
gap: 30px;
flex-wrap: wrap;
}

.card {
background: #1a1a1a;
padding: 30px;
border-radius: 15px;
width: 250px;
transition: 0.3s;
}

.card:hover {
transform: translateY(-10px);
}

footer {
text-align: center;
padding: 20px;
background: black;
}
</style>

</head>

<body>

<header>
<h2>UA Store</h2>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Luxury Leather Collection</h1>
<p>Premium Style. Timeless Identity.</p>
<button>Shop Now</button>
</section>

<section class="section">
<h2>Our Products</h2>
<div class="products">
<div class="card">Leather Jackets</div>
<div class="card">Leather Bags</div>
<div class="card">Leather Belts</div>
</div>
</section>

<section class="section">
<h2>About UA</h2>
<p>We create premium leather products designed for modern lifestyle and bold identity.</p>
</section>

<footer>
<p>© 2026 UA Leather Works</p>
</footer>

</body>
</html>
